<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Hex Takeover Pro</title>
<style>
body { margin:0; background:#1a1a1a; color:white; font-family:'Segoe UI',sans-serif; display:flex; height:100vh;}
#sidebar { width:250px; background:#333; padding:20px; display:flex; flex-direction:column; gap:15px; box-shadow:2px 0 15px rgba(0,0,0,0.3);}
#main { flex:1; display:flex; justify-content:center; align-items:center; position:relative;}
canvas { max-width:95%; max-height:95%; border-radius:15px; background:#252525; cursor:pointer;}
button { padding:6px 15px; cursor:pointer; background:#00bcd4; color:white; border:none; border-radius:15px; font-weight:bold; transition:0.2s;}
button:hover { background:#00e5ff; transform:scale(1.05);}
input[type=range], input[type=checkbox]{ cursor:pointer;}
.status { font-size:22px; margin:10px; height:50px;}
.legend { margin-top:10px; font-size:14px; color:#888;}
.dot { height:10px; width:10px; border-radius:50%; display:inline-block; margin:0 5px;}
</style>
</head>
<body>
<div id="sidebar">
    <label>棋盤大小: <span id="sizeValue">3</span></label>
    <input type="range" id="sizeRange" min="2" max="10" value="3">
    <label>障礙物數量: <span id="obstacleValue">3</span></label>
    <input type="range" id="obstacleRange" min="0" max="20" value="3">
    <button id="resetBtn">重置棋局</button>
    <button id="undoBtn">悔棋</button>
    <label><input type="checkbox" id="aiToggle"> AI 開啟</label>
    <div id="status"></div>
    <div class="legend">
        <span class="dot" style="background: rgba(0, 255, 0, 0.5);"></span> 複製
        <span class="dot" style="background: rgba(255, 255, 0, 0.5);"></span> 跳躍
        <span class="dot" style="background: rgba(128,128,128,0.8);"></span> 障礙物
    </div>
</div>
<div id="main">
    <canvas id="gameCanvas" width="800" height="800"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const statusDiv = document.getElementById('status');
const sizeRange = document.getElementById('sizeRange');
const sizeValue = document.getElementById('sizeValue');
const obstacleRange = document.getElementById('obstacleRange');
const obstacleValue = document.getElementById('obstacleValue');
const resetBtn = document.getElementById('resetBtn');
const aiToggle = document.getElementById('aiToggle');

let grid = [], hexSize, selectedHex=null, hoveredHex=null, currentPlayer=1, gameActive=true, boardRadius=3, history=[];

sizeRange.oninput = ()=>{ sizeValue.innerText = sizeRange.value; }
obstacleRange.oninput = ()=>{ obstacleValue.innerText = obstacleRange.value; }

function saveHistory(){
    history.push({ grid:grid.map(h=>({...h})), currentPlayer });
}

function undoMove(){
    if(history.length===0) return;
    // AI 模式悔棋兩步
    if(aiToggle.checked && history.length>=2){
        history.pop();
        const last = history.pop();
        grid = last.grid.map(h=>({...h}));
        currentPlayer = last.currentPlayer;
    } else {
        const last = history.pop();
        grid = last.grid.map(h=>({...h}));
        currentPlayer = last.currentPlayer;
    }
    draw();
    updateStatus();
}

function setOwner(q,r,player){ const hex = grid.find(h=>h.q===q&&h.r===r); if(hex) hex.owner=player; }

function getHexPos(q,r){ return { x: canvas.width/2 + hexSize*1.5*q, y: canvas.height/2 + hexSize*(Math.sqrt(3)/2*q + Math.sqrt(3)*r) }; }

function getDistance(h1,h2){ return (Math.abs(h1.q-h2.q)+Math.abs(h1.q+h1.r-h2.q-h2.r)+Math.abs(h1.r-h2.r))/2; }

function getNearestHex(mx,my){ let minDist=Infinity, nearest=null; grid.forEach(h=>{ let d=Math.hypot(h.x-mx,h.y-my); if(d<minDist){ minDist=d; nearest=h; } }); return minDist<hexSize*0.8 ? nearest : null; }

function generateObstacles(count){
    let emptyHexes = grid.filter(h => h.type === 'normal' && h.owner === 0);
    for(let i=0;i<count;i++){
        if(emptyHexes.length===0) break;
        const idx=Math.floor(Math.random()*emptyHexes.length);
        emptyHexes[idx].type='obstacle';
        emptyHexes[idx].owner=0;
        emptyHexes.splice(idx,1);
    }
}

function initGame(){
    boardRadius = parseInt(sizeRange.value);
    grid=[]; gameActive=true; currentPlayer=1; selectedHex=null; hoveredHex=null; history=[];
    const padding=50;
    const availW = canvas.width - padding*2;
    const availH = canvas.height - padding*2;
    const sizeByW = availW / (3*boardRadius+1.5);
    const sizeByH = availH / (Math.sqrt(3)*(2*boardRadius+1));
    hexSize = Math.min(sizeByW,sizeByH);

    for(let q=-boardRadius;q<=boardRadius;q++){
        for(let r=Math.max(-boardRadius,-q-boardRadius); r<=Math.min(boardRadius,-q+boardRadius); r++){
            const pos=getHexPos(q,r);
            grid.push({ q,r,x:pos.x,y:pos.y, owner:0, scale:1, ripple:0, type:'normal' });
        }
    }
    // 初始棋子
    setOwner(0,-boardRadius,1); grid.find(h=>h.q===0&&h.r===-boardRadius).type='normal';
    setOwner(0,boardRadius,2); grid.find(h=>h.q===0&&h.r===boardRadius).type='normal';
    setOwner(boardRadius,-boardRadius,2); grid.find(h=>h.q===boardRadius&&h.r===-boardRadius).type='normal';
    setOwner(-boardRadius,boardRadius,1); grid.find(h=>h.q===-boardRadius&&h.r===boardRadius).type='normal';

    generateObstacles(parseInt(obstacleRange.value));

    updateStatus();
}

function updateStatus(){
    const blue = grid.filter(h=>h.owner===1).length;
    const red = grid.filter(h=>h.owner===2).length;
    const turnColor = currentPlayer===1?"#00e5ff":"#ff5252";
    canvas.style.boxShadow = currentPlayer===1?"0 0 25px #00e5ff":"0 0 25px #ff5252";
    statusDiv.innerHTML=`<span style="color:#00e5ff">藍: ${blue}</span> | <span style="color:#ff5252"> 紅: ${red}</span><br>
        当前行动: <span style="color:${turnColor}">${currentPlayer===1?'藍色':'红色'}</span>`;
}

function checkGameOver(){
    const blue=grid.filter(h=>h.owner===1).length;
    const red=grid.filter(h=>h.owner===2).length;
	
	if(blue === 0 || red === 0){
		gameActive = false;
		const winner = blue===0 ? "红色" : "藍色";
		const winnercolor = blue===0 ? "#ff5252" : "#00e5ff";
		
		statusDiv.innerHTML=`<b style="color:${winnercolor}; font-size:28px;">
			${winner} 完全佔領勝利！
		</b><br><button onclick="initGame()">再來一局</button>`;
		return true;
	}
	
    function hasMove(p){ return grid.some(start=>start.owner===p && grid.some(end=>end.owner===0 && end.type==='normal' && getDistance(start,end)<=2)); }
    if(!hasMove(1)&&!hasMove(2)){
        gameActive=false;
        const winner = blue>red?"藍色":red>blue?"红色":"平局";
		const winnercolor = blue===0 ? "#ff5252" : "#00e5ff";
        statusDiv.innerHTML=`<b style="color:${winnercolor}; font-size:28px;">${winner} 勝利！</b><br>
            <button onclick="initGame()">再來一局</button>`;
        return true;
    }
    if(!hasMove(currentPlayer)){
        currentPlayer = currentPlayer===1?2:1;
        updateStatus();
    }
    return false;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    grid.forEach(h=>{
        h.scale += (1-h.scale)*0.15;
        if(h.ripple>0) h.ripple*=0.92;
        let fill="#3a3a3a";
        if(h.type==='obstacle') fill="#555555";
        else if(h.owner===1) fill="#00e5ff";
        else if(h.owner===2) fill="#ff5252";

        if(selectedHex && h.owner===0 && h.type==='normal'){
            const d=getDistance(selectedHex,h);
            if(d===1) fill="rgba(0,255,0,0.3)";
            if(d===2) fill="rgba(255,255,0,0.3)";
        }

        ctx.beginPath();
        for(let i=0;i<6;i++){
            const angle=Math.PI/3*i;
            ctx.lineTo(h.x + hexSize*0.92*h.scale*Math.cos(angle), h.y + hexSize*0.92*h.scale*Math.sin(angle));
        }
        ctx.closePath();
        ctx.fillStyle=fill; ctx.fill();
        ctx.strokeStyle="#555"; ctx.lineWidth=1; ctx.stroke();

        if(h.ripple>0.05){
            ctx.beginPath();
            ctx.arc(h.x,h.y,hexSize*h.ripple,0,Math.PI*2);
            ctx.strokeStyle=`rgba(255,255,255,${h.ripple})`; ctx.stroke();
        }

        if(h===hoveredHex){ ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke(); }
        if(h===selectedHex){ ctx.strokeStyle="yellow"; ctx.lineWidth=4; ctx.stroke(); }
    });
    requestAnimationFrame(draw);
}

function move(from,to){
    saveHistory();
    const d=getDistance(from,to);
    if(d===2) from.owner=0;
    to.owner=currentPlayer;
    to.scale=0.5;
    grid.forEach(h=>{ if(getDistance(to,h)===1 && h.owner!==0 && h.owner!==currentPlayer){ h.owner=currentPlayer; h.ripple=1; } });
    selectedHex=null;
    if(!checkGameOver()){
        currentPlayer=currentPlayer===1?2:1;
        updateStatus();
        if(aiToggle.checked && currentPlayer===2){ setTimeout(aiMove,300); }
    }
}

canvas.addEventListener('mousemove', e=>{
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left)*(canvas.width/rect.width);
    const my = (e.clientY - rect.top)*(canvas.height/rect.height);
    hoveredHex = getNearestHex(mx,my);
});

canvas.addEventListener('click', e=>{
    if(!gameActive) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left)*(canvas.width/rect.width);
    const my = (e.clientY - rect.top)*(canvas.height/rect.height);
    const clickedHex = getNearestHex(mx,my);
    if(!clickedHex) return;

    // 只要是玩家自己的棋子，都能選中
    if(clickedHex.owner===currentPlayer){
        selectedHex = (selectedHex===clickedHex?null:clickedHex);
    } 
    // 目標必須是空白且非障礙物
    else if(selectedHex && clickedHex.owner===0 && clickedHex.type==='normal'){
        if(getDistance(selectedHex,clickedHex)<=2) move(selectedHex,clickedHex);
    }
});

document.getElementById('undoBtn').onclick = ()=>undoMove();
resetBtn.onclick = ()=>initGame();

function aiMove(){
    let moves=[];
    grid.forEach(a=>{
        if(a.owner!==2) return;
        grid.forEach(b=>{
            if(b.owner===0 && b.type==='normal' && getDistance(a,b)<=2){
                let score=0;
                grid.forEach(n=>{ if(getDistance(b,n)===1 && n.owner===1) score++; });
                moves.push({a,b,score});
            }
        });
    });
    if(moves.length===0) return;
    moves.sort((x,y)=>y.score-x.score);
    const m = moves[0];
    move(m.a,m.b);
}

initGame();
draw();
</script>
</body>
</html>
